services:
  web:
    image: ghcr.io/adhityan26/3dpb-web:latest
    container_name: 3dpb-web
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_SANITY_PROJECT_ID: ${PUBLIC_SANITY_PROJECT_ID}
      PUBLIC_SANITY_DATASET: ${PUBLIC_SANITY_DATASET:-production}
      PUBLIC_SANITY_API_VERSION: ${PUBLIC_SANITY_API_VERSION:-2024-10-01}
      SANITY_WRITE_TOKEN: ${SANITY_WRITE_TOKEN}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      SITE_URL: ${SITE_URL}
      # Set to "true" once Strava production access is granted.
      # false (default): GPX upload is primary, Strava OAuth is collapsed at bottom.
      # true: Strava connect is primary (expanded), GPX is collapsed at bottom.
      STRAVA_PRIMARY: ${STRAVA_PRIMARY:-false}

  studio:
    image: ghcr.io/adhityan26/3dpb-studio:latest
    container_name: 3dpb-studio
    restart: unless-stopped
    ports:
      - "3333:80"
